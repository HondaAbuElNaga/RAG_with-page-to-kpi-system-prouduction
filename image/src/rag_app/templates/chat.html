<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; display: flex; flex-direction: column; height: 100vh; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.6; position: relative; }
        .user-message { align-self: flex-start; background-color: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-end; background-color: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        .input-area { background: white; padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .loading { font-style: italic; color: #888; font-size: 0.9em; display: none;}
        /* تحسين شكل الروابط */
        .bot-message a { color: #0056b3; font-weight: bold; text-decoration: underline; }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #555;
            padding: 5px 0;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #555;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatBox">
        <div class="message bot-message">
            مرحباً بك! 👋 أنا المساعد الذكي للمعهد السعودي. كيف يمكنني مساعدتك اليوم؟
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" class="form-control" placeholder="اكتب سؤالك هنا...">
        
        <button id="sendBtn" onclick="sendMessage()" class="btn btn-primary px-4">إرسال</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
